name: Release

# Triggered by the tag push from git-rel (`make release`). The release itself
# is created moments later by `gh release create` with git-cliff notes; the
# upload step below attaches artifacts to that existing release. No
# `release: published` trigger: git-rel's release creation runs under the
# user's token and would fire a second, redundant build.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64. The ABI must be -gnu: a bare "x86_64-linux" target
          # resolves to musl, whose signal.h SIG_ERR macro fails translate-c
          # inside the libvoid dependency.
          - os: ubuntu-24.04
            target: x86_64-linux-gnu
            artifact_name: hexe-x86_64-linux

          # Linux aarch64 (native runner, avoids C cross-compilation issues)
          - os: ubuntu-24.04-arm
            target: aarch64-linux-gnu
            artifact_name: hexe-aarch64-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build binary
        env:
          GIT_CEILING_DIRECTORIES: ${{ github.workspace }}/.zig-cache
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      - name: Smoke-test binary
        # Both targets run natively on their runner, so a basic invocation
        # catches a broken artifact before it ships.
        run: zig-out/bin/hexe --help

      - name: Prepare artifact
        run: |
          mkdir -p dist
          tar -czf dist/${{ matrix.artifact_name }}.tar.gz -C zig-out/bin hexe
          (cd dist && sha256sum ${{ matrix.artifact_name }}.tar.gz > ${{ matrix.artifact_name }}.tar.gz.sha256)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}.tar.gz
            dist/${{ matrix.artifact_name }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
